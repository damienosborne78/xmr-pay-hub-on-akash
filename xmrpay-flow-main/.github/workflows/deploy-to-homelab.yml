name: Deploy to Homelab

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app
        run: bun run build

      - name: Restart with PM2
        run: |
          pm2 delete xmrpay-flow || true
          pm2 start ecosystem.config.js --name xmrpay-flow
          pm2 save
          pm2 status
