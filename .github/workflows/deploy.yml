name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        run: |
          cd xmrpay-flow-main
          bun install --frozen-lockfile
          bun run build

      - name: Deploy built files and restart
        run: |
          # Copy the freshly built dist folder to the permanent location
          rm -rf /home/node/.openclaw/workspace/xmrpay-flow-main/dist
          cp -r xmrpay-flow-main/dist /home/node/.openclaw/workspace/xmrpay-flow-main/

          cd /home/node/.openclaw/workspace/xmrpay-flow-main
          
          echo "=== Restarting PM2 ==="
          pm2 delete xmrpay-flow || true
          pm2 start ecosystem.config.cjs --name xmrpay-flow
          pm2 save
          
          echo "=== Final status ==="
          pm2 status
          ss -tlnp | grep 3001
