name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        run: |
          cd xmrpay-flow-main
          bun install --frozen-lockfile
          bun run build
          echo "Build completed successfully"

      - name: Restart PM2 correctly
        run: |
          cd /home/node/.openclaw/workspace/xmrpay-flow-main
          
          echo "=== Stopping old process ==="
          pm2 delete xmrpay-flow || true
          
          echo "=== Starting new process from correct path ==="
          pm2 start ecosystem.config.cjs --name xmrpay-flow
          
          echo "=== Saving PM2 config ==="
          pm2 save
          
          echo "=== Final PM2 status ==="
          pm2 status
          
          echo "=== Port check ==="
          ss -tlnp | grep 3001 || echo "No process on 3001"
