name: Deploy to Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted

    env:
      WORK_DIR: ${{ github.workspace }}/xmrpay-flow-main
      TARGET_DIR: /home/node/.openclaw/workspace/xmrpay-flow-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: xmrpay-flow-main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        working-directory: ${{ github.workspace }}/xmrpay-flow-main
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Deploy new build
        run: |
          set -euo pipefail

          rm -rf "$TARGET_DIR/dist"
          cp -r "$WORK_DIR/dist" "$TARGET_DIR/"

          echo "✅ New build copied"

          echo "🔄 Restarting service (no sudo)..."
          
          # Kill old process
          pkill -f "npx serve -s dist -l 3001" || true
          sleep 2
          
          # Start new process
          cd "$TARGET_DIR"
          nohup /usr/bin/env npx serve -s dist -l 3001 --no-port-switching > serve.log 2>&1 &
          sleep 3

          echo "=== Service status ==="
          ps aux | grep "npx serve" | grep -v grep || true

          echo "=== Port check ==="
          ss -tlnp | grep 3001 || true
