name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        run: |
          echo "=== Working directory ==="
          pwd
          cd xmrpay-flow-main
          echo "=== Inside project folder ==="
          pwd
          ls -la
          bun install --frozen-lockfile
          bun run build
          echo "=== Build finished successfully ==="

      - name: Restart PM2 with full debug
        run: |
          cd xmrpay-flow-main
          echo "=== Current PM2 processes before restart ==="
          pm2 status
          echo "=== Killing old process ==="
          pm2 delete xmrpay-flow || true
          echo "=== Starting new process ==="
          pm2 start ecosystem.config.cjs --name xmrpay-flow
          sleep 3
          echo "=== PM2 status after restart ==="
          pm2 status
          echo "=== Port 3001 check ==="
          ss -tlnp | grep 3001 || echo "No process listening on 3001"
          echo "=== Last 20 lines of PM2 logs ==="
          pm2 logs xmrpay-flow --lines 20
