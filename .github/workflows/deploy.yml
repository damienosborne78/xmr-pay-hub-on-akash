name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          cd xmrpay-flow-main
          echo "=== Building in xmrpay-flow-main ==="
          pwd
          bun install --frozen-lockfile
          bun run build
          echo "✅ Build completed"

      - name: Copy build and restart service
        run: |
          echo "=== Copying dist folder to live location ==="
          rm -rf /home/node/.openclaw/workspace/xmrpay-flow-main/dist
          cp -r xmrpay-flow-main/dist /home/node/.openclaw/workspace/xmrpay-flow-main/

          echo "✅ Build copied"

          echo "=== Restarting systemd service ==="
          sudo systemctl restart xmrpay-flow

          echo "=== Service status ==="
          sudo systemctl status xmrpay-flow --no-pager -l

          echo "=== Port 3001 check ==="
          ss -tlnp | grep 3001 || echo "No process on 3001"
