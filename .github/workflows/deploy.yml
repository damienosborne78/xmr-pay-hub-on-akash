name: Deploy to Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted

    env:
      WORK_DIR: ${{ github.workspace }}/xmrpay-flow-main
      TARGET_DIR: /home/node/.openclaw/workspace/xmrpay-flow-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: xmrpay-flow-main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        working-directory: ${{ github.workspace }}/xmrpay-flow-main
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Deploy new build
        run: |
          set -euo pipefail
          rm -rf "$TARGET_DIR/dist"
          cp -r "$WORK_DIR/dist" "$TARGET_DIR/"
          echo "✅ New build deployed"

      - name: Restart service
        run: |
          set -euo pipefail
          systemctl --user restart xmrpay-flow || true
          sleep 5
          systemctl --user status xmrpay-flow --no-pager

      - name: Health check
        run: |
          curl -f http://localhost:3001 || echo "Health check failed"
