name: Deploy to Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: xmrpay-flow-main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        working-directory: xmrpay-flow-main
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy new build
        run: |
          set -euo pipefail

          APP_DIR="/home/node/.openclaw/workspace/xmrpay-flow-main"
          BUILD_DIR="${GITHUB_WORKSPACE}/xmrpay-flow-main/dist"

          rm -rf "${APP_DIR}/dist"
          cp -r "${BUILD_DIR}" "${APP_DIR}/"

          echo "✅ New build copied"

          echo "🔄 Restarting service..."
          sudo -n systemctl restart xmrpay-flow

          echo "=== Service status ==="
          sudo -n systemctl status xmrpay-flow --no-pager -l

          echo "=== Port check ==="
          ss -tlnp | grep 3001
