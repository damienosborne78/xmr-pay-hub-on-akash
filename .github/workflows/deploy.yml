name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        run: |
          cd xmrpay-flow-main
          bun install --frozen-lockfile
          bun run build
          echo "✅ Build completed successfully"

      - name: Deploy new build
        run: |
          # Copy the new dist folder to the location the service is serving
          rm -rf /home/node/.openclaw/workspace/xmrpay-flow-main/dist
          cp -r xmrpay-flow-main/dist /home/node/.openclaw/workspace/xmrpay-flow-main/

          echo "✅ New build copied to live folder"

          # Restart the systemd service
          echo "🔄 Restarting xmrpay-flow service..."
          sudo systemctl restart xmrpay-flow

          echo "=== Service status ==="
          sudo systemctl status xmrpay-flow --no-pager -l

          echo "=== Port check ==="
          ss -tlnp | grep 3001
