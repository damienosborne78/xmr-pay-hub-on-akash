name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the app
        run: |
          cd xmrpay-flow-main
          bun install --frozen-lockfile
          bun run build

      - name: Deploy new build
        run: |
          # Copy the freshly built files to the production folder
          rm -rf /home/node/.openclaw/workspace/xmrpay-flow-main/dist
          cp -r xmrpay-flow-main/dist /home/node/.openclaw/workspace/xmrpay-flow-main/

          echo "=== Restarting systemd service ==="
          sudo systemctl restart xmrpay-flow

          echo "=== Service status ==="
          sudo systemctl status xmrpay-flow --no-pager -l

          echo "=== Port 3001 check ==="
          ss -tlnp | grep 3001 || echo "No process on 3001"
