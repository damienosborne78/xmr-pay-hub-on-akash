events {
    worker_connections 1024;
}

http {
    # Enhanced logging for Cloudflare debugging
    log_format cloudflare '$remote_addr - $http_cf_connecting_ip [$time_local] '
                         '"$request" $status $bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         '"$http_x_forwarded_for" "$host" "$server_name"';
    
    access_log /var/log/nginx/access.log cloudflare;
    error_log /var/log/nginx/error.log debug;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        # Accept ALL domains - catches Cloudflare + Akash
        server_name _ xmr.depincloud.net *.xmr.depincloud.net *.akash;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # SPA Routing - handles all client-side paths
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
